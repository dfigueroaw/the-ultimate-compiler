<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cx - Compiler Playground</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚙️</text></svg>" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <span class="logo">Cx</span>
      <span class="subtitle">Compiler Playground</span>
      <span class="spacer"></span>
      <button id="ast-btn" class="secondary-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        AST
      </button>
      <button id="run-btn" class="secondary-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Run
      </button>
      <button id="compile-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Compile
      </button>
    </header>

    <main id="main">
      <section id="editor-panel">
        <div class="panel-header">editor.c</div>
        <div id="editor-container"></div>
      </section>

      <div id="resize-h" class="resize-handle resize-h"></div>

      <section id="results">
        <div class="result-pane" id="input-pane">
          <div class="panel-header" style="color: #7aa2f7;">Input</div>
          <textarea id="input-content" class="pane-content" placeholder="Program stdin..."></textarea>
        </div>

        <div class="resize-handle resize-v"></div>

        <div class="result-pane" id="output-pane">
          <div class="panel-header" style="color: #9ecea6;">
            <span>Output</span>
            <button class="copy-btn" data-target="output-content" title="Copy output">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <div class="pane-content placeholder" id="output-content">Program output will appear here</div>
        </div>

        <div class="resize-handle resize-v"></div>

        <div class="result-pane" id="asm-pane">
          <div class="panel-header" style="color: #f7768e;">
            <span>Assembly (x86)</span>
            <button class="copy-btn" data-target="asm-content" title="Copy assembly">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <div class="pane-content placeholder" id="asm-content">Generated assembly will appear here</div>
        </div>
      </section>
    </main>

    <div id="ast-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            AST
          </span>
          <div class="modal-zoom-controls">
            <button id="ast-zoom-in" class="zoom-btn" title="Zoom in">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <button id="ast-zoom-out" class="zoom-btn" title="Zoom out">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <button id="ast-zoom-reset" class="zoom-btn" title="Reset zoom">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
          </div>
          <button id="ast-modal-close" class="modal-close">&times;</button>
        </div>
        <div id="ast-container" class="modal-body"></div>
      </div>
    </div>
  </div>

  <script src="/wasm/compiler.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
